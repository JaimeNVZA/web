    <style>
        /* ===== PROJECT PAGE SPECIFIC ===== */
        .proj-page-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            z-index: 999;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            background: rgba(10, 25, 47, 0.92);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }
        .proj-page-nav .nav-inner {
            max-width: var(--max);
            margin: 0 auto;
            padding: 0 40px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .proj-page-nav .nav-logo {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 3px;
            margin-right: auto;
            text-decoration: none;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: var(--font);
            transition: var(--t);
            background: transparent;
            cursor: pointer;
            text-decoration: none;
        }
        .back-btn:hover {
            background: var(--accent-dim);
            transform: translateX(-3px);
        }
        .back-btn svg { flex-shrink: 0; }

        /* ===== PROJECT HERO ===== */
        .proj-hero {
            padding-top: calc(var(--nav-h) + 60px);
            padding-bottom: 60px;
            padding-left: 40px;
            padding-right: 40px;
            text-align: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .proj-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(100,255,218,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .proj-hero-tag {
            display: inline-block;
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
            font-family: monospace;
        }
        .proj-hero h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            color: var(--text-1);
            margin-bottom: 10px;
        }
        .proj-hero p.subtitle {
            color: var(--text-3);
            font-size: 0.95rem;
            max-width: 560px;
            margin: 0 auto;
        }

        /* ===== PROJECT SECTIONS ===== */
        .proj-section {
            max-width: var(--max);
            margin: 0 auto 50px;
            padding: 0 40px;
        }
        .proj-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: monospace;
        }
        .proj-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-soft);
        }

        /* ===== GALLERY ===== */
        .proj-gallery {
            background: var(--bg-alt);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
        }
        .imagen-actual {
            max-width: 100%;
            max-height: 500px;
            width: auto;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto 20px;
            box-shadow: 0 8px 30px rgba(2,12,27,0.6);
        }
        .gallery-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        }
        .gallery-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--t);
            text-decoration: none;
            user-select: none;
        }
        .gallery-btn:hover { background: var(--accent-dim); }

        /* ===== TECHNOLOGIES ===== */
        .proj-tech-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 28px;
            background: var(--bg-alt);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
        }
        .proj-tech-icons a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
            transition: var(--t);
            min-width: 80px;
        }
        .proj-tech-icons a:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
            transform: translateY(-4px);
        }
        .proj-tech-icons img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        /* ===== DESCRIPTION ===== */
        .proj-description {
            background: var(--bg-alt);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 32px;
        }
        .proj-description p {
            color: var(--text-3);
            font-size: 0.95rem;
            line-height: 1.85;
            margin-bottom: 16px;
        }
        .proj-description p:last-child { margin-bottom: 0; }
        .proj-description strong { color: var(--text-2); font-weight: 600; }

        /* ===== CODE LINK ===== */
        .proj-code-box {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-alt);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 28px 32px;
        }
        .proj-code-box svg { color: var(--accent); flex-shrink: 0; }
        .proj-code-box p {
            color: var(--text-3);
            font-size: 0.88rem;
            margin: 0;
            flex: 1;
        }

        /* ===== PROJECT FOOTER ===== */
        .proj-footer-wrap {
            max-width: var(--max);
            margin: 60px auto 0;
            padding: 0 40px 40px;
        }

        @media (max-width: 768px) {
            .proj-hero, .proj-section, .proj-footer-wrap { padding-left: 20px; padding-right: 20px; }
            .proj-page-nav .nav-inner { padding: 0 20px; }
            .proj-tech-icons a { min-width: 60px; padding: 10px; }
            .proj-tech-icons img { width: 38px; height: 38px; }
            .proj-code-box { flex-direction: column; text-align: center; }
        }
    </style>
</head>
